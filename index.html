    const MODEL_FAST = 'grok-3-mini-fast';
    const MODEL_FULL = 'grok-4-latest';

    async function callGemini(apiKey, systemPrompt, userQuery, useFastModel = false) {
      const model = useFastModel ? MODEL_FAST : MODEL_FULL;
      let delay = 1000;
      for (let i = 0; i < 3; i++) {
        try {
          const body = {
            model,
            response_format: { type: 'json_object' },
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userQuery }
            ]
          };
          if (useFastModel) body.max_tokens = 2000;
          body.apiKey = apiKey;
          const res = await fetch('https://vuvavjmbvdqnwtleudqh.supabase.co/functions/v1/xai-proxy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!res.ok) {
            const errText = await res.text();
            // If fast model not available, fall back to full model
            if (useFastModel && (res.status === 400 || res.status === 404)) {
              return callGemini(apiKey, systemPrompt, userQuery, false);
            }
            throw new Error('API ' + res.status + ': ' + errText.substring(0, 200));
          }
          const data = await res.json();
          return JSON.parse(data.choices[0].message.content);
        } catch (err) {
          if (i === 2) throw err;
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
      }
    }

    function tokenizeHebrew(text) {
      // Aligned with preprocess-kb.js tokenize() — same prefix-stripping + synonyms
      const hebrewPrefixes = /^[בלמכהושו]{1,2}/;
      return text.toLowerCase()
        .replace(/[^\u0590-\u05FEa-z0-9\s\-]/g, ' ')
        .split(/\s+/)
        .flatMap(t => {
          if (SYNONYMS[t]) return [SYNONYMS[t], t];
          if (t.length > 3 && /[\u0590-\u05FE]/.test(t)) {
            const stripped = t.replace(hebrewPrefixes, '');
            if (stripped.length >= 2) {
              if (SYNONYMS[stripped]) return [SYNONYMS[stripped], stripped];
              return [stripped];
            }
          }
          return [t];
        })
        .filter(t => t.length > 1 && !HEBREW_STOP_WORDS.has(t));
    }

    function bm25Search(query, index, chunks, topK = 5) {
      const queryTokens = tokenizeHebrew(query);
      if (!queryTokens.length) return [];
      const k1 = 1.5, b = 0.75;
      const N = index.totalDocs, avgDL = index.avgDocLength;
      const scores = {};
      for (const token of queryTokens) {
        const termData = index.terms[token];
        if (!termData) continue;
        const df = termData[0];
        const idf = Math.log((N - df + 0.5) / (df + 0.5) + 1);
        for (let i = 1; i < termData.length; i += 2) {
          const chunkIdx = termData[i], tf = termData[i + 1];
          const chunk = chunks[chunkIdx];
          if (!chunk) continue;
          const dl = chunk.text ? chunk.text.split(/\s+/).length : avgDL;
          const tfNorm = (tf * (k1 + 1)) / (tf + k1 * (1 - b + b * dl / avgDL));
          scores[chunkIdx] = (scores[chunkIdx] || 0) + idf * tfNorm;
        }
      }
      return Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, topK)
        .map(([idx]) => chunks[idx]);
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (m === 0) return n;
      if (n === 0) return m;
      let prev = Array.from({length: n + 1}, (_, i) => i);
      for (let i = 1; i <= m; i++) {
        const curr = [i];
        for (let j = 1; j <= n; j++) {
          curr[j] = a[i-1] === b[j-1] ? prev[j-1] : 1 + Math.min(prev[j-1], prev[j], curr[j-1]);
        }
        prev = curr;
      }
      return prev[n];
    }

    function expandQueryLocal(query) {
      const words = query.toLowerCase().split(/\s+/);
      const additions = [];
      const matched = new Set();
      for (const word of words) {
        if (word.length < 3) continue;
        for (const tool of KNOWN_TOOLS) {
          if (matched.has(tool.names[0])) continue;
          for (const name of tool.names) {
            const dist = levenshtein(word, name);
            // Normalized distance: ratio of edits to word length
            // 0.4 threshold = up to 40% of characters can differ
            // "FROPESO"→"prospero" = 3/8 = 0.375 ✓
            // "PROPEZO"→"prospero" = 2/8 = 0.25 ✓
            const maxLen = Math.max(word.length, name.length);
            if (maxLen > 0 && dist / maxLen <= 0.4) {
              additions.push(tool.search);
              matched.add(tool.names[0]);
              break;
            }
          }
          if (matched.size > 3) break;
        }
      }
      return additions.length ? `${query} ${additions.join(' ')}` : query;
    }

                highlightCode(cleanForCopy)
              ),
              placeholders.length > 0 && React.createElement('div', { className: 'px-4 py-3 bg-amber-50 border-t border-amber-200 text-xs' },
                React.createElement('div', { className: 'font-bold text-amber-800 mb-1.5' }, '✏️ החלף את השדות המודגשים:'),
                React.createElement('div', { className: 'flex flex-wrap gap-2' },
                  placeholders.map((p, j) => React.createElement('span', { key: j, className: 'bg-amber-200 text-amber-900 px-2 py-0.5 rounded font-bold' },
                    legendMap[p] || p
                  ))
                )
              )
            ));
            codeLines = [];
            codeBlock = false;
          } else {
            flushList();
            codeBlock = true;
          }
          continue;
        }
        if (codeBlock) { codeLines.push(line); continue; }

        // Empty line
        if (!line.trim()) { flushList(); continue; }

        // Headers — guide mode gets visually rich styling
        if (line.startsWith('### ')) {
          flushList();
          const headerText = line.slice(4);
          if (guideMode) {
            // Detect step headers like "שלב 1:" or "שלב 2:"
            const stepMatch = headerText.match(/^שלב\s*(\d+)\s*[:\-—]\s*(.+)/);
            if (stepMatch) {
              elements.push(React.createElement('div', { key: 'step-' + i, className: 'flex items-center gap-3 mt-6 mb-3' },
                React.createElement('span', { className: 'flex-shrink-0 w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 text-white text-sm font-bold flex items-center justify-center shadow-sm' }, stepMatch[1]),
                React.createElement('h4', { className: 'font-bold text-base text-slate-800' }, inlineMd(stepMatch[2]))
              ));
            } else {
              elements.push(React.createElement('h4', { key: 'h4-' + i, className: 'font-bold text-base text-slate-800 mt-5 mb-2 flex items-center gap-2' },
                React.createElement('span', { className: 'w-1.5 h-5 bg-blue-500 rounded-full inline-block flex-shrink-0' }),
                inlineMd(headerText)
              ));
            }
          } else {
            elements.push(React.createElement('h4', { key: 'h4-' + i, className: 'font-bold text-base text-slate-800 mt-5 mb-2 flex items-center gap-2' },
              React.createElement('span', { className: 'w-1.5 h-5 bg-blue-500 rounded-full inline-block flex-shrink-0' }),
              inlineMd(headerText)
            ));
          }
          continue;
        }
        if (line.startsWith('## ')) {
          flushList();
          const headerText = line.slice(3);
          if (guideMode) {
            const style = getSectionStyle(headerText);
            elements.push(React.createElement('div', { key: 'h3-' + i, className: `${style.bg} ${style.border} border rounded-xl px-5 py-3 mt-8 mb-4 flex items-center gap-3` },
              React.createElement('span', { className: 'text-xl' }, style.icon),
              React.createElement('h3', { className: `font-bold text-lg ${style.textColor}` }, inlineMd(headerText))
            ));
          } else {
            elements.push(React.createElement('h3', { key: 'h3-' + i, className: 'font-bold text-lg text-blue-700 mt-6 mb-3 pb-2 border-b border-blue-100' },
              inlineMd(headerText)
            ));
          }
          continue;
        }
        if (line.startsWith('# ')) {
          flushList();
          // In guide mode, skip # title (already shown as article title above)
          if (guideMode) continue;
          elements.push(React.createElement('h2', { key: 'h2-' + i, className: 'font-bold text-xl text-slate-900 mt-4 mb-3' },
            inlineMd(line.slice(2))
          ));
          continue;
        }

        // Ordered list (1. 2. 3.)
        const olMatch = line.match(/^\s*(\d+)\.\s+(.+)/);
        if (olMatch) {
          if (listType === 'ul') flushList();
          listType = 'ol';
          listItems.push(olMatch[2]);
          continue;
        }

        // Unordered list (- item)
        const ulMatch = line.match(/^\s*[-*]\s+(.+)/);
        if (ulMatch) {
          if (listType === 'ol') flushList();
          listType = 'ul';
          listItems.push(ulMatch[1]);
          continue;
        }

        // Regular paragraph
        flushList();
        elements.push(React.createElement('p', { key: 'p-' + i, className: guideMode ? 'text-sm leading-relaxed my-2 text-slate-600' : 'text-sm leading-relaxed my-2' }, inlineMd(line)));
      }
      flushList();
      return elements;
    }

    // ─── Guide Section Renderer ─────────────────────────────────────────
    const GuideSection = ({ section, index }) => {
      if (section.type === 'intro') return (
        <div className="bg-blue-50 border border-blue-100 rounded-xl p-5 mb-5">
          <p className="text-blue-900 leading-relaxed">{section.content}</p>
        </div>
      );
      if (section.type === 'steps') return (
        <div className="mb-5">
          <h3 className="font-bold text-slate-800 text-lg mb-3">{section.title}</h3>
          <ol className="space-y-3">
            {section.items.map((item, i) => (
              <li key={i} className="flex gap-3 items-start">
                <span className="flex-shrink-0 w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 text-white text-xs font-bold flex items-center justify-center mt-0.5">{i+1}</span>
                <span className="text-slate-700 leading-relaxed pt-0.5">{item}</span>

            ))}

        </div>
      );
      if (section.type === 'warning') return (
        <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-5 flex gap-3">
          <span className="text-xl flex-shrink-0">⚠️</span>
          <p className="text-amber-800 leading-relaxed text-sm">{section.content}</p>
        </div>
      );
      if (section.type === 'example') return (
        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-5">
          <h4 className="font-bold text-slate-700 text-sm mb-2">{section.title || 'דוגמה'}</h4>
          <p className="text-slate-600 leading-relaxed text-sm">{section.content}</p>
        </div>
      );
      return null;
    };

    // ─── Knowledge Base Component ────────────────────────────────────────
    const KnowledgeBase = ({ apiKey }) => {
      const [articles, setArticles] = useState(null);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('guides'); // 'guides' | 'notes'
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedGuide, setSelectedGuide] = useState(null);
      const [selectedArticle, setSelectedArticle] = useState(null);
      const [platformFilter, setPlatformFilter] = useState('all');

      useEffect(() => {
        fetch('kb-articles.json').then(r => r.json())
          .then(data => { setArticles(data); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      // ─── Guide Constants ───
      const GUIDE_ICONS = { 'make-guides': '📖', 'make-recipes': '🍳', 'make-basics': '🔰', 'make-connections': '🔌', 'make-advanced': '🚀', 'make-errors': '⚠️', 'manychat-basics': '💬', 'manychat-bots': '🤖' };
      const GUIDE_DIFFICULTY = { 'make-guides': 'beginner', 'make-basics': 'beginner', 'make-connections': 'beginner', 'make-recipes': 'intermediate', 'make-advanced': 'advanced', 'make-errors': 'intermediate', 'manychat-basics': 'beginner', 'manychat-bots': 'intermediate' };

      // ─── Guide Detail View ───
      if (selectedGuide) {
        const article = (articles || []).find(a => a.id === selectedGuide);
        if (!article) { setSelectedGuide(null); return null; }
        const guideIcon = GUIDE_ICONS[article.category] || '📄';
        const guideDiff = GUIDE_DIFFICULTY[article.category] || 'intermediate';
        const readTime = Math.max(2, Math.round(article.wordCount / 200));
        return (
          <div className="slide-in">
            <button onClick={() => setSelectedGuide(null)}

              <ChevronLeft size={16}/> חזרה למאגר הידע
            </button>
            <div className="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm">
              <div className="flex flex-wrap gap-2 mb-4 items-center">
                <span className="text-2xl">{guideIcon}</span>
                <span className="text-xs font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-800">
                  {GUIDE_CATEGORIES[article.category]?.name || KB_CATEGORIES[article.category] || article.category}
                </span>
                <span className={`text-xs font-bold px-3 py-1 rounded-full ${DIFFICULTY_LABELS[guideDiff]?.className || 'bg-slate-100 text-slate-600'}`}>

                </span>

              {article.relatedApps && article.relatedApps.length > 0 && (

                  ))}
                </div>
              )}
              <div className="mt-6">
                {renderMarkdown(article.content, true)}
              </div>
            </div>
          </div>
        );
      }

      // ─── Video Note Detail View ───
      if (selectedArticle) {
        const article = articles?.find(a => a.id === selectedArticle);
        if (!article) { setSelectedArticle(null); return null; }
        return (
          <div className="slide-in">
            <button onClick={() => setSelectedArticle(null)}
              className="flex items-center gap-2 text-slate-500 hover:text-slate-800 font-bold text-sm mb-6 hover:bg-slate-100 px-3 py-2 rounded-lg transition-all">
              <ChevronLeft size={16}/> חזרה למאגר הידע
            </button>
            <div className="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
              <div className="flex flex-wrap gap-2 mb-4">
                <span className="text-xs font-bold px-3 py-1 rounded-full bg-slate-200 text-slate-700">📹 הערת וידאו</span>
                <span className="text-xs font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-800">
                  {KB_CATEGORIES[article.category] || article.category}
                </span>
                <span className={`text-xs font-bold px-3 py-1 rounded-full ${article.platform === 'make' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'}`}>
                  {article.platform === 'make' ? 'Make.com' : 'ManyChat'}
                </span>
                <span className="text-xs text-slate-400 px-2 py-1">{article.wordCount} מילים</span>
              </div>
              <h2 className="text-3xl font-display text-slate-900 mb-4">{article.title}</h2>
              {article.summary && (
                <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6">
                  <p className="text-blue-800 leading-relaxed">{article.summary}</p>
                </div>
              )}
              {article.takeaways && article.takeaways.length > 0 && (
                <div className="bg-amber-50 border border-amber-100 rounded-xl p-4 mb-6">
                  <h4 className="font-bold text-amber-800 mb-2">נקודות מפתח</h4>
                  <ul className="space-y-1">
                    {article.takeaways.map((t, i) => (
                      <li key={i} className="text-amber-700 text-sm flex items-start gap-2">
                        <span className="text-amber-500 mt-0.5">•</span> {t}
                      </li>
                    ))}
                  </ul>
                </div>
              )}
              <div>
                {renderMarkdown(article.content)}
              </div>
            </div>
          </div>
        );
      }

      // ─── Guides List (generated from KB articles) ───
      const guides = (articles || [])
        .filter(a => a.content && a.content.includes('## '))
        .map(a => ({
          id: a.id,
          title: a.title,
          summary: a.summary || '',
          category: a.category,
          platform: a.platform,
          icon: GUIDE_ICONS[a.category] || '📄',
          difficulty: GUIDE_DIFFICULTY[a.category] || 'intermediate',
          readTime: Math.max(2, Math.round(a.wordCount / 200)),
          wordCount: a.wordCount,
          relatedApps: a.relatedApps || []
        }));
      const filteredGuides = guides.filter(g => {
        if (selectedCategory && g.category !== selectedCategory) return false;
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          return g.title.toLowerCase().includes(term) || g.summary.toLowerCase().includes(term);
        }
        return true;
      });

      const filteredArticles = (articles || []).filter(a => {
        if (selectedCategory && a.category !== selectedCategory) return false;
        if (platformFilter !== 'all' && a.platform !== platformFilter) return false;
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          return a.title.toLowerCase().includes(term) || (a.summary && a.summary.toLowerCase().includes(term));
        }
        return true;
      });

      return (
        <div>
          {/* Toggle: Guides / Video Notes */}
          <div className="flex items-center justify-center gap-3 mb-6">
            <button onClick={() => { setViewMode('guides'); setSelectedCategory(null); }}
              className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all border-2 ${
                viewMode === 'guides'
                  ? 'bg-blue-600 border-blue-600 text-white shadow-lg shadow-blue-200'
                  : 'bg-white border-slate-200 text-slate-600 hover:border-blue-300'
              }`}>📖 מדריכים מקצועיים</button>
            <button onClick={() => { setViewMode('notes'); setSelectedCategory(null); }}
              className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all border-2 ${
                viewMode === 'notes'
                  ? 'bg-blue-600 border-blue-600 text-white shadow-lg shadow-blue-200'
                  : 'bg-white border-slate-200 text-slate-600 hover:border-blue-300'
              }`}>📹 הערות וידאו ({articles ? articles.length : '...'})</button>
          </div>

          {/* Search */}
          <div className="relative mb-6">
            <input type="text" placeholder={viewMode === 'guides' ? 'חפש מדריך...' : 'חפש הערת וידאו...'}
              className="w-full bg-white border-2 border-slate-200 rounded-xl px-5 py-3 pr-12 outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400 transition-all"
              value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"><SearchIcon size={18}/></div>
          </div>

          {viewMode === 'guides' ? (
            <div>
              {/* Guide category buttons */}
              <div className="flex flex-wrap gap-2 mb-8">
                {Object.entries(GUIDE_CATEGORIES).map(([id, cat]) => {
                  const count = guides.filter(g => g.category === id).length;
                  if (!count) return null;
                  return (
                    <button key={id} onClick={() => setSelectedCategory(selectedCategory === id ? null : id)}
                      className={`px-4 py-2 rounded-2xl text-sm font-bold transition-all ${
                        selectedCategory === id
                          ? 'bg-gradient-to-l from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-200 scale-105'
                          : 'bg-white border-2 border-slate-100 text-slate-700 hover:border-blue-200 hover:bg-blue-50'
                      }`}>{cat.name} <span className="opacity-70 mr-1 text-xs">{count}</span></button>
                  );
                })}
              </div>

              {/* Guide cards grid */}
              <div className="grid gap-4 md:grid-cols-2">
                {filteredGuides.length === 0 ? (
                  <div className="text-center py-12 text-slate-400 col-span-2">
                    <p className="text-lg font-display">לא נמצאו מדריכים</p>
                    <p className="text-sm mt-1">נסה לחפש מונח אחר</p>
                  </div>
                ) : filteredGuides.map(guide => (
                  <div key={guide.id} onClick={() => setSelectedGuide(guide.id)}
                    className="bg-white border border-slate-200 rounded-xl p-5 hover:border-blue-300 hover:shadow-lg transition-all cursor-pointer group">
                    <div className="flex items-start gap-3">
                      <span className="text-3xl flex-shrink-0">{guide.icon}</span>
                      <div className="flex-1 min-w-0">
                        <div className="flex flex-wrap gap-2 mb-2">
                          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${DIFFICULTY_LABELS[guide.difficulty]?.className || 'bg-slate-100'}`}>
                            {DIFFICULTY_LABELS[guide.difficulty]?.text || guide.difficulty}
                          </span>
                          <span className="text-xs text-slate-400">⏱️ {guide.readTime} דק׳</span>
                        </div>
                        <h3 className="font-bold text-slate-800 group-hover:text-blue-700 transition-colors mb-1">{guide.title}</h3>
                        <p className="text-sm text-slate-500 line-clamp-2">{guide.summary}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="text-center mt-6 text-sm text-slate-400">
                {filteredGuides.length} מדריכים {selectedCategory ? 'בקטגוריה' : 'סה"כ'}
              </div>
            </div>
          ) : (
            <div>
              {/* Video notes - platform filter + categories */}
              <div className="flex items-center justify-center gap-3 mb-4">
                {[['all','📚 הכל'],['make','⚙️ Make.com'],['manychat','💬 ManyChat']].map(([val, label]) => (
                  <button key={val} onClick={() => { setPlatformFilter(val); setSelectedCategory(null); }}
                    className={`px-4 py-2 rounded-full text-xs font-bold transition-all border ${
                      platformFilter === val
                        ? 'bg-slate-700 border-slate-700 text-white'
                        : 'bg-white border-slate-200 text-slate-600 hover:border-slate-400'
                    }`}>{label}</button>
                ))}
              </div>
              <div className="flex flex-wrap gap-2 mb-6">
                {Object.entries(KB_CATEGORIES)
                  .filter(([k]) => platformFilter === 'all' || k.startsWith(platformFilter === 'make' ? 'make-' : 'manychat-'))
                  .map(([id, name]) => {
                    const count = (articles || []).filter(a => a.category === id).length;
                    if (!count) return null;
                    return (
                      <button key={id} onClick={() => setSelectedCategory(selectedCategory === id ? null : id)}
                        className={`px-3 py-1.5 rounded-2xl text-xs font-bold transition-all ${
                          selectedCategory === id
                            ? 'bg-slate-700 text-white shadow'
                            : 'bg-white border border-slate-100 text-slate-600 hover:border-slate-300'
                        }`}>{name} <span className="opacity-60 mr-1">{count}</span></button>
                    );
                  })}
              </div>

              {/* Video note cards */}
              {loading ? (
                <div className="text-center py-12">
                  <Spinner size={40} color="#64748b"/>
                  <p className="text-slate-400 mt-4">טוען הערות וידאו...</p>
                </div>
              ) : (
                <div className="grid gap-3">
                  {filteredArticles.length === 0 ? (
                    <div className="text-center py-12 text-slate-400">
                      <p className="text-lg font-display">לא נמצאו הערות</p>
                      <p className="text-sm mt-1">נסה לחפש מונח אחר</p>
                    </div>
                  ) : filteredArticles.map(article => (
                    <div key={article.id} onClick={() => setSelectedArticle(article.id)}
                      className="bg-white border border-slate-200 rounded-xl p-4 hover:border-slate-400 hover:shadow-sm transition-all cursor-pointer group">
                      <div className="flex items-start justify-between gap-4">
                        <div className="flex-1 min-w-0">
                          <div className="flex flex-wrap gap-2 mb-1.5">
                            <span className="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">📹</span>
                            <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">
                              {KB_CATEGORIES[article.category] || article.category}
                            </span>
                          </div>
                          <h3 className="font-bold text-slate-700 group-hover:text-slate-900 transition-colors text-sm mb-1">{article.title}</h3>
                          <p className="text-xs text-slate-400 line-clamp-1">{article.summary}</p>
                        </div>
                        <div className="text-xs text-slate-400 whitespace-nowrap">{article.wordCount} מילים</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <div className="text-center mt-6 text-sm text-slate-400">
                {filteredArticles.length} הערות {selectedCategory ? 'בקטגוריה' : 'סה"כ'}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ─── Expert Chat (RAG) Component ─────────────────────────────────────
    const ExpertChat = ({ apiKey }) => {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [kbData, setKbData] = useState(null);
      const [kbLoading, setKbLoading] = useState(true);
      const chatEndRef = useRef(null);

      useEffect(() => {
        Promise.all([
          fetch('kb-chunks.json').then(r => r.json()),
          fetch('kb-index.json').then(r => r.json()),
          fetch('known-tools.json').then(r => r.json()).catch(() => [])
        ]).then(([chunks, index, dynamicTools]) => {
          setKbData({ chunks, index });
          if (dynamicTools.length) KNOWN_TOOLS = dynamicTools;
          setKbLoading(false);
        }).catch(() => setKbLoading(false));
      }, []);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const sendMessage = async (forceWeb = false) => {
        if (!input.trim() || loading || !kbData) return;
        const question = input.trim();
        setInput('');
        const newUserMsg = { role: 'user', text: question };
        setMessages(prev => [...prev, newUserMsg]);
        setLoading(true);
        try {
          const currentHistory = [...messages, newUserMsg];

          if (forceWeb) {
            const answer = await askWithWebSearch(apiKey, question, currentHistory);
            setMessages(prev => [...prev, { role: 'assistant', text: answer, sources: [], fromWeb: true }]);
          } else {
            // Step 1: Local fuzzy expansion — instant, no API call
            const expandedQuery = expandQueryLocal(question);
            const wasExpanded = expandedQuery !== question;

            // Step 2: BM25 search with expanded query
            const results = bm25Search(expandedQuery, kbData.index, kbData.chunks, 8);

            // Step 3: Check result quality — are results actually about the topic?
            let resultsRelevant = results.length >= 2;
            if (resultsRelevant && wasExpanded) {
              const addedTerms = expandedQuery.substring(question.length).toLowerCase().split(/\s+/).filter(t => t.length >= 4);
              const topResults = results.slice(0, 5);
              const hasRelevant = topResults.some(r =>
                addedTerms.some(term => r.text && r.text.toLowerCase().includes(term))
              );
              if (!hasRelevant) resultsRelevant = false;
            }

            if (resultsRelevant) {
              const answer = await askExpert(apiKey, question, results, currentHistory);
              const sources = results.slice(0, 5).map(r => ({ title: r.title, id: r.articleId }));
              setMessages(prev => [...prev, { role: 'assistant', text: answer, sources }]);
            } else {
              // Auto fallback to web search
              const answer = await askWithWebSearch(apiKey, question, currentHistory);
              setMessages(prev => [...prev, { role: 'assistant', text: answer, sources: [], fromWeb: true }]);
            }
          }
        } catch (err) {

                </div>
              )}

              <div className="w-18 h-18 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200/50 float" style={{width:'4.5rem',height:'4.5rem'}}>
                <ZapIcon size={34} fill="currentColor"/>
              </div>
              <h1 className="text-4xl md:text-5xl font-display text-slate-900 mb-3">בנה אוטומציות בלי קוד</h1>
              <p className="text-slate-500 text-lg mb-8 max-w-lg mx-auto">ספר לנו מה אתה רוצה לאוטמט — ונבנה לך את התהליך צעד אחר צעד</p>

              {/* 3 Steps indicator */}
              <div className="flex items-center justify-center gap-4 md:gap-8 mb-2 fade-in-up-delay-1">
                <div className="flex flex-col items-center gap-2">
                  <div className="w-12 h-12 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center text-xl font-display">1</div>
                  <span className="text-xs text-slate-500 font-bold">תתאר בעברית</span>
                </div>
                <div className="text-slate-300 text-2xl mb-5">→</div>
                <div className="flex flex-col items-center gap-2">
                  <div className="w-12 h-12 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center text-xl font-display">2</div>
                  <span className="text-xs text-slate-500 font-bold">קבל הוראות מדויקות</span>
                </div>
                <div className="text-slate-300 text-2xl mb-5">→</div>
                <div className="flex flex-col items-center gap-2">
                  <div className="w-12 h-12 rounded-2xl bg-green-100 text-green-600 flex items-center justify-center text-xl font-display">3</div>
                  <span className="text-xs text-slate-500 font-bold">הרץ ב-Make.com</span>
                </div>
              </div>
            </div>

            {/* Tab Navigation */}
            <div className="flex justify-center gap-2 mb-8 fade-in-up-delay-1">
              {[
                ['automations', '⚡ בונה אוטומציות'],
                ['knowledge', '📚 מאגר ידע'],
                ['expert', '💬 שאל את המומחה']
              ].map(([id, label]) => (
                <button key={id} onClick={() => setCurrentTab(id)}
                  className={`px-6 py-3 rounded-2xl text-sm font-display transition-all ${
                    currentTab === id
                      ? 'bg-gradient-to-l from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-200 scale-105'
                      : 'bg-white border-2 border-slate-200 text-slate-600 hover:border-blue-300 hover:shadow-sm'
                  }`}>{label}</button>
              ))}
            </div>

            {currentTab === 'automations' && (<>
            {/* Search */}
            <form onSubmit={search} className="relative group mb-10 fade-in-up-delay-2">
              <div className="absolute inset-0 bg-gradient-to-l from-blue-600 to-indigo-600 rounded-3xl blur-lg opacity-10 group-focus-within:opacity-20 transition-opacity"/>
              <div className="relative flex bg-white rounded-2xl shadow-lg shadow-blue-100/30 border-2 border-blue-100 overflow-hidden p-2">
                <input type="text"
                  className="flex-grow px-6 py-4 text-lg outline-none bg-transparent font-body"
                  placeholder="מה תרצה לאוטמט? למשל: כשמישהו ממלא טופס — לשלוח לו מייל ולהוסיף ל-CRM"
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                />
                <button type="submit" disabled={loading}
                  className="bg-gradient-to-l from-blue-600 to-indigo-600 text-white px-8 py-4 rounded-xl font-display text-lg flex items-center gap-2 hover:shadow-lg hover:shadow-blue-200 active:scale-95 transition-all disabled:opacity-50">
                  {loading ? <Spinner size={22} color="white"/> : <SearchIcon size={22}/>}
                  <span>מצא לי</span>
                </button>
              </div>
              <p className="text-center text-xs text-slate-400 mt-3">אין צורך במונחים טכניים — כתוב כמו שאתה מדבר</p>
            </form>

            {/* Personal filter toggle */}
            <div className="flex items-center justify-center gap-3 mb-8 -mt-6">
              <button onClick={() => setPersonalOnly(p => !p)}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all border-2 ${
                  personalOnly
                    ? 'bg-green-50 border-green-300 text-green-800 shadow-sm'
                    : 'bg-slate-50 border-slate-200 text-slate-500 hover:border-slate-300'
                }`}>
                <span className={`w-8 h-5 rounded-full flex items-center transition-all ${personalOnly ? 'bg-green-500 justify-end' : 'bg-slate-300 justify-start'}`}>
                  <span className="w-4 h-4 bg-white rounded-full shadow mx-0.5"/>
                </span>
                {personalOnly ? '👤 מציג רק חשבון אישי' : '🔓 מציג הכל כולל עסקי/מפתחים'}
              </button>
              {personalOnly && (
                <span className="text-xs text-slate-400">טמפלייטים שדורשים דף עסקי/Company Page מוסתרים</span>
              )}
            </div>

            {/* Error */}
            {error && (
              <div className="bg-red-50 border-2 border-red-100 text-red-700 p-5 rounded-2xl flex items-center gap-4 mb-8">
                <AlertIcon size={24}/>
                <p className="font-bold">{error}</p>
              </div>
            )}

            {/* Results */}
            <div className="grid gap-6">
              {loading ? (
                <div className="text-center py-24">
                  <Spinner size={50} color="#2563eb"/>
                  <p className="text-slate-500 text-xl font-display mt-6">בונה לך את האוטומציה...</p>
                  <p className="text-slate-400 text-sm mt-2">זה לוקח כמה שניות — אנחנו מתאימים את ההגדרות בדיוק בשבילך</p>
                </div>
              ) : results.length > 0 ? (
                filterTemplates(results).length > 0 ? filterTemplates(results).map((item, idx) => (
                  <TemplateCard key={idx} item={item} apiKey={apiKey}/>
                )) : (
                  <div className="text-center py-12 bg-orange-50 border-2 border-orange-200 rounded-2xl">
                    <p className="text-orange-800 font-bold text-lg mb-2">כל התוצאות דורשות חשבון עסקי/מפתחים</p>
                    <p className="text-orange-600 text-sm mb-3">כבה את הפילטר כדי לראות אותן, או חפש משהו אחר</p>
                    <button onClick={() => setPersonalOnly(false)}
                      className="bg-orange-100 text-orange-800 px-4 py-2 rounded-lg text-sm font-bold hover:bg-orange-200 transition-all">
                      🔓 הצג בכל זאת
                    </button>
                  </div>
                )
              ) : !error && (
                <div>
                  {/* Category tabs */}
                  <div className="mb-6">
                    <h2 className="text-xl font-display text-slate-800 mb-1">{results.length === 0 ? 'או בחר תבנית מוכנה מהרשימה' : ''}</h2>
                    <p className="text-sm text-slate-400 mb-4">{results.length === 0 ? 'כל תבנית כוללת הוראות הקמה מלאות — פשוט לחץ ועקוב' : ''}</p>
                    <div className="flex flex-wrap gap-2">
                      {TEMPLATE_CATEGORIES.map(cat => (
                        <button key={cat.id} onClick={() => setActiveCategory(activeCategory === cat.id ? null : cat.id)}
                          className={`px-4 py-2.5 rounded-2xl text-sm font-bold transition-all ${
                            activeCategory === cat.id
                              ? 'bg-gradient-to-l from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-200 scale-105'
                              : 'bg-white border-2 border-slate-100 text-slate-700 hover:border-blue-200 hover:bg-blue-50 hover:shadow-sm'
                          }`}>
                          {cat.name}
                          <span className="mr-1.5 text-xs opacity-70">{cat.templates.length}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Show templates for selected category, or all categories preview */}
                  {activeCategory ? (() => {
                    const filtered = filterTemplates(TEMPLATE_CATEGORIES.find(c => c.id === activeCategory)?.templates || []);
                    return filtered.length > 0 ? (
                      <div className="grid gap-6">
                        {filtered.map((t, idx) => (
                          <TemplateCard key={idx} item={t} apiKey={apiKey}/>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-12 bg-orange-50 border-2 border-orange-200 rounded-2xl">
                        <p className="text-orange-800 font-bold mb-2">כל הטמפלייטים בקטגוריה זו דורשים חשבון עסקי/מפתחים</p>
                        <button onClick={() => setPersonalOnly(false)}
                          className="bg-orange-100 text-orange-800 px-4 py-2 rounded-lg text-sm font-bold hover:bg-orange-200">
                          🔓 הצג בכל זאת
                        </button>
                      </div>
                    );
                  })() : (
                    <div className="space-y-8">
                      {TEMPLATE_CATEGORIES.map(cat => {
                        const filtered = filterTemplates(cat.templates);
                        if (filtered.length === 0) return null;
                        return (
                        <div key={cat.id}>
                          <div className="flex items-center justify-between mb-3">
                            <h3 className="font-display text-slate-700 text-lg">{cat.name}</h3>
                            <button onClick={() => setActiveCategory(cat.id)}
                              className="text-blue-600 text-xs font-bold hover:underline">
                              הצג הכל ({filtered.length}) ←
                            </button>
                          </div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {filtered.slice(0, 2).map((t, idx) => (
                              <div key={idx} onClick={() => setActiveCategory(cat.id)}
                                className="bg-white border border-slate-200 rounded-xl p-4 hover:border-blue-300 hover:shadow-md transition-all cursor-pointer group">
                                <div className="font-bold text-slate-800 text-sm mb-1 group-hover:text-blue-700">{t.name}</div>
                                <p className="text-xs text-slate-500 line-clamp-2">{t.description}</p>
                                <div className="flex items-center gap-2 mt-2 flex-wrap">
                                  <span className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">{t.trigger.app}</span>
                                  <span className="text-slate-300 text-xs">→</span>
                                  <span className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">{t.action.app}</span>
                                  {t.scenarioFlow && <span className="text-xs text-indigo-400">+{t.scenarioFlow.split('→').length} מודולים</span>}
                                  <span className="mr-auto text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded-full">👤 אישי</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              {/* More templates sources */}
              {results.length > 0 && (
                <div className="bg-gradient-to-l from-indigo-50 to-blue-50 border-2 border-indigo-100 rounded-2xl p-6 mt-2">
                  <h3 className="font-display text-indigo-900 text-lg mb-4">איפה למצוא עוד טמפלייטים?</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <a href="https://www.make.com/en/templates" target="_blank" rel="noopener noreferrer"
                      className="bg-white rounded-xl p-4 border border-indigo-100 hover:border-indigo-300 hover:shadow-md transition-all group">
                      <div className="font-black text-slate-800 text-sm mb-1 group-hover:text-indigo-700">📦 ספריית הטמפלייטים של Make.com</div>
                      <p className="text-xs text-slate-500">1,000+ טמפלייטים מוכנים לשימוש — חפש לפי אפליקציה או קטגוריה</p>
                    </a>
                    <a href="https://www.make.com/en/integrations" target="_blank" rel="noopener noreferrer"
                      className="bg-white rounded-xl p-4 border border-indigo-100 hover:border-indigo-300 hover:shadow-md transition-all group">
                      <div className="font-black text-slate-800 text-sm mb-1 group-hover:text-indigo-700">🔌 דף אינטגרציות</div>
                      <p className="text-xs text-slate-500">בחר 2 אפליקציות וראה טמפלייטים שמחברים ביניהן</p>
                    </a>
                    <a href="https://community.make.com/c/share-your-scenarios/13" target="_blank" rel="noopener noreferrer"
                      className="bg-white rounded-xl p-4 border border-indigo-100 hover:border-indigo-300 hover:shadow-md transition-all group">
                      <div className="font-black text-slate-800 text-sm mb-1 group-hover:text-indigo-700">👥 קהילת Make.com</div>
                      <p className="text-xs text-slate-500">סצנריות ששיתפו משתמשים אחרים — כולל JSON לייבוא ישיר</p>
                    </a>
                    <a href="https://www.make.com/en/templates?fromPublicLibrary=true" target="_blank" rel="noopener noreferrer"
                      className="bg-white rounded-xl p-4 border border-indigo-100 hover:border-indigo-300 hover:shadow-md transition-all group">
                      <div className="font-black text-slate-800 text-sm mb-1 group-hover:text-indigo-700">🌍 ספריה ציבורית</div>
                      <p className="text-xs text-slate-500">טמפלייטים מהקהילה שעברו אישור — לפעמים מתקדמים ומפתיעים</p>
                    </a>
                  </div>
                  <div className="bg-white/70 rounded-xl px-4 py-3 mt-3 border border-indigo-100">
                    <p className="text-xs text-indigo-800">
                      <span className="font-black">💡 טיפ ייבוא:</span> בכל טמפלייט ב-Make.com לחץ <code className="bg-indigo-100 px-1.5 py-0.5 rounded text-xs font-mono">"Use template"</code> →
                      הוא ייפתח ישירות בחשבון שלך עם כל המודולים מוכנים. בקהילה — העתק את ה-JSON → ב-Make.com לחץ
                      <code className="bg-indigo-100 px-1.5 py-0.5 rounded text-xs font-mono mx-1">⋯</code> →
                      <code className="bg-indigo-100 px-1.5 py-0.5 rounded text-xs font-mono">Import Blueprint</code>
                    </p>
                  </div>
                </div>
              )}
            </div>
            </>)}

            {currentTab === 'knowledge' && <KnowledgeBase apiKey={apiKey}/>}
            {currentTab === 'expert' && <ExpertChat apiKey={apiKey}/>}

          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
